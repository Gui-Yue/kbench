name: Tau Benchmark
run-name: Tau Benchmark | ${{ format('{0}/{1}', github.event.inputs.provider || 'openai', github.event.inputs.model || 'unset-model') }}

on:
  workflow_dispatch:
    inputs:
      harness:
        description: Harness to run inside kbench
        required: true
        type: choice
        default: kode-agent-sdk
        options:
          - kode-agent-sdk
      provider:
        description: Model provider
        required: true
        type: choice
        default: openai
        options:
          - openai
          - anthropic
          - gemini
      model:
        description: Model id for the selected provider
        required: true
        default: ""
      base_url:
        description: Optional base URL override for the selected provider
        required: false
        default: ""
      tau_env:
        description: Tau domain
        required: false
        default: retail
      task_split:
        description: Tau task split
        required: false
        default: test
      user_model:
        description: User simulator model
        required: false
        default: ""
      user_model_provider:
        description: User simulator provider
        required: false
        default: openai
      user_strategy:
        description: User simulator strategy
        required: false
        default: llm
      task_ids:
        description: Optional comma-separated task IDs
        required: false
        default: ""
      num_trials:
        description: Number of trials
        required: false
        default: "1"
      max_concurrency:
        description: Max concurrent tasks
        required: false
        default: "1"
      start_index:
        description: Start index when task_ids is empty
        required: false
        default: "0"
      end_index:
        description: End index, -1 means all
        required: false
        default: "-1"
      seed:
        description: Random seed
        required: false
        default: "10"
      shuffle:
        description: Shuffle task order, 0 or 1
        required: false
        default: "0"
      temperature:
        description: Model temperature
        required: false
        default: "0.0"
      retry_attempts:
        description: Retry attempts for rate-limited Tau calls
        required: false
        default: "6"
      retry_initial_delay:
        description: Initial backoff delay in seconds
        required: false
        default: "5"
      retry_max_delay:
        description: Maximum backoff delay in seconds
        required: false
        default: "60"
      retry_backoff:
        description: Backoff multiplier
        required: false
        default: "2"
      tau_ref:
        description: tau-bench git ref to clone at runtime
        required: false
        default: main

jobs:
  tau-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      KBENCH_HARNESS: ${{ github.event.inputs.harness || 'kode-agent-sdk' }}
      MODEL_NAME: ${{ format('{0}/{1}', github.event.inputs.provider, github.event.inputs.model) }}
      RUN_ID: tau-${{ github.run_id }}-${{ github.run_attempt }}
      TAU_ENV: ${{ github.event.inputs.tau_env || 'retail' }}
      TAU_TASK_SPLIT: ${{ github.event.inputs.task_split || 'test' }}
      TAU_USER_MODEL: ${{ github.event.inputs.user_model || vars.OPENAI_MODEL_ID || vars.EVAL_MODEL || 'gpt-4o' }}
      TAU_USER_MODEL_PROVIDER: ${{ github.event.inputs.user_model_provider || 'openai' }}
      TAU_USER_STRATEGY: ${{ github.event.inputs.user_strategy || 'llm' }}
      TAU_TASK_IDS: ${{ github.event.inputs.task_ids || '' }}
      TAU_NUM_TRIALS: ${{ github.event.inputs.num_trials || '1' }}
      TAU_MAX_CONCURRENCY: ${{ github.event.inputs.max_concurrency || '1' }}
      TAU_START_INDEX: ${{ github.event.inputs.start_index || '0' }}
      TAU_END_INDEX: ${{ github.event.inputs.end_index || '-1' }}
      TAU_SEED: ${{ github.event.inputs.seed || '10' }}
      TAU_SHUFFLE: ${{ github.event.inputs.shuffle || '0' }}
      TAU_TEMPERATURE: ${{ github.event.inputs.temperature || '0.0' }}
      TAU_RETRY_ATTEMPTS: ${{ github.event.inputs.retry_attempts || '6' }}
      TAU_RETRY_INITIAL_DELAY: ${{ github.event.inputs.retry_initial_delay || '5' }}
      TAU_RETRY_MAX_DELAY: ${{ github.event.inputs.retry_max_delay || '60' }}
      TAU_RETRY_BACKOFF: ${{ github.event.inputs.retry_backoff || '2' }}
      TAU_REF: ${{ github.event.inputs.tau_ref || 'main' }}
      NO_REBUILD: "1"
      OPENAI_API_KEY: ${{ github.event.inputs.provider == 'openai' && secrets.OPENAI_API_KEY || '' }}
      OPENAI_BASE_URL: ${{ github.event.inputs.provider == 'openai' && (github.event.inputs.base_url || vars.OPENAI_BASE_URL) || '' }}
      OPENAI_API: ${{ github.event.inputs.provider == 'openai' && vars.OPENAI_API || '' }}
      ANTHROPIC_API_KEY: ${{ github.event.inputs.provider == 'anthropic' && secrets.ANTHROPIC_API_KEY || '' }}
      ANTHROPIC_BASE_URL: ${{ github.event.inputs.provider == 'anthropic' && (github.event.inputs.base_url || vars.ANTHROPIC_BASE_URL) || '' }}
      GEMINI_API_KEY: ${{ github.event.inputs.provider == 'gemini' && secrets.GEMINI_API_KEY || '' }}
      GEMINI_BASE_URL: ${{ github.event.inputs.provider == 'gemini' && (github.event.inputs.base_url || vars.GEMINI_BASE_URL) || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate selected provider config
        shell: bash
        env:
          HARNESS: ${{ github.event.inputs.harness || 'kode-agent-sdk' }}
          PROVIDER: ${{ github.event.inputs.provider }}
          MODEL: ${{ github.event.inputs.model }}
          OPENAI_API_KEY_SECRET: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY_SECRET: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY_SECRET: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          [[ "$HARNESS" == "kode-agent-sdk" ]] || { echo "Unsupported harness: $HARNESS" >&2; exit 1; }
          [[ -n "$MODEL" ]] || { echo "model is required" >&2; exit 1; }
          case "$PROVIDER" in
            openai)
              [[ -n "${OPENAI_API_KEY_SECRET:-}" ]] || { echo "Missing OPENAI_API_KEY secret" >&2; exit 1; }
              ;;
            anthropic)
              [[ -n "${ANTHROPIC_API_KEY_SECRET:-}" ]] || { echo "Missing ANTHROPIC_API_KEY secret" >&2; exit 1; }
              ;;
            gemini)
              [[ -n "${GEMINI_API_KEY_SECRET:-}" ]] || { echo "Missing GEMINI_API_KEY secret" >&2; exit 1; }
              ;;
            *)
              echo "Unsupported provider: $PROVIDER" >&2
              exit 1
              ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install KODE dependencies
        run: |
          npm ci
          npm run bench:bundle:cli

      - name: Run Tau benchmark
        run: ./bin/kbench benchmark run --benchmark tau --harness "$KBENCH_HARNESS" --model-name "$MODEL_NAME" --run-id "$RUN_ID"

      - name: Summarize Tau outputs
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p .bench
          RUN_DIR=".kbench/runs/$RUN_ID"
          for result in "$RUN_DIR"/*.json; do
            report=".bench/$(basename "$result" .json)-report.md"
            python3 scripts/bench/render-tau-report.py \
              --input "$result" \
              --output "$report"
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload Tau artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tau-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .kbench/runs/${{ env.RUN_ID }}
            .bench
